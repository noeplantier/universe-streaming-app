# netlify.toml
# Configuration de déploiement pour Universe (Expo Web → Netlify)

[build]
  # Commande de build Expo pour le web
  command = "npx expo export --platform web"

  # Répertoire de sortie d'Expo web
  publish = "dist"

# ── Redirects SPA ────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── En-têtes de sécurité ─────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    # ✨ Ajoute cette ligne :
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;"

# ── Cache des assets statiques ───────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"