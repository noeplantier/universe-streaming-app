# netlify.toml
# Configuration de déploiement pour Universe (Expo Web → Netlify)

[build]
  # Commande de build Expo pour le web
  command = "npx expo export --platform web"

  # Répertoire de sortie d'Expo web
  publish = "dist"

# ── Redirects SPA ────────────────────────────────────────────────────────────
# Sans cette règle, Netlify renvoie une 404 sur toutes les routes
# autres que "/" (ex : /profile, /settings, /social, etc.)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── En-têtes de sécurité ─────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache des assets statiques ───────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"