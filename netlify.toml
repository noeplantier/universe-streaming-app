[build]
  # Indique à Netlify que le projet Expo est dans /frontend
  base = "frontend"
  command = "npm install --legacy-peer-deps && npx expo export"
  # Le dossier dist sera relatif à "frontend" (donc frontend/dist)
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  EXPO_WEB_DEBUG = "true"
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200